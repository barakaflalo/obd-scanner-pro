<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Gauge arc background -->
  <path d="M 130 340 A 150 150 0 1 1 382 340" fill="none" stroke="#334155" stroke-width="24" stroke-linecap="round"/>
  <!-- Gauge arc active (amber) -->
  <path d="M 130 340 A 150 150 0 1 1 340 190" fill="none" stroke="url(#amber)" stroke-width="24" stroke-linecap="round"/>
  <!-- Gauge needle -->
  <line x1="256" y1="280" x2="340" y2="190" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
  <circle cx="256" cy="280" r="12" fill="#f59e0b"/>
  <!-- Bluetooth symbol -->
  <g transform="translate(256,390)">
    <path d="M 0,-28 L 16,-12 L -12,12 L 0,28 L 0,-28 L -16,-12 L 12,12 L 0,28" fill="none" stroke="url(#blue)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Scan waves -->
  <path d="M 380 260 Q 400 260 400 240" fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <path d="M 390 270 Q 420 270 420 230" fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M 400 280 Q 440 280 440 220" fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <!-- OBD text -->
  <text x="256" y="310" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="28" font-weight="700">OBD</text>
</svg>
